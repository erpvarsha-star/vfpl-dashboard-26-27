<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="timestamp" content="2023-10-27">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsCore Pro | Company Operations Platform</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM & VARIABLES --- */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-main: #f8fafc;
            --bg-sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --sidebar-width: 260px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        ul { list-style: none; }
        button { cursor: pointer; border: none; transition: var(--transition); font-family: inherit; }
        input, select, textarea { font-family: inherit; outline: none; }

        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .p-4 { padding: 1rem; }
        .card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .badge { padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .login-card { width: 100%; max-width: 400px; padding: 2.5rem; background: var(--white); border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-card h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--bg-sidebar); }
        .login-card p { color: var(--text-muted); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: var(--transition); }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-primary { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border-radius: 8px; font-weight: 600; font-size: 1rem; }
        .btn-primary:hover { background: varvar-primary-dark; }

        /* --- MAIN APP LAYOUT --- */
        #app-shell { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width); background: var(--bg-sidebar); color: #cbd5e1;
            display: flex; flex-direction: column; padding: 1.5rem 0; transition: var(--transition);
        }
        .sidebar-logo { padding: 0 1.5rem 2rem 1.5rem; font-size: 1.5rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; }
        .sidebar-nav { flex: 1; padding: 0 0.75rem; }
        .nav-item {
            display: flex; align-items: center; padding: 0.75rem 1rem; margin-bottom: 0.25rem;
            border-radius: 8px; color: #94a3b8; text-decoration: none; font-weight: 500; transition: var싱;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 24px; margin-right: 12px; text-align: center; font-size: 1.2rem; }

        /* Main Content Area */
        #main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        header {
            height: 64px; background: var(--white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
            position: sticky; top: 0; z-index: 10;
        }
        .user-profile { display: flex; items-center: center; gap: 12px; cursor: pointer; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Content View Container */
        .view-container { padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }

        /* --- COMPONENTS: DASHBOARD CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { padding: 1.5rem; border-radius: 12px; background: var(--white); border: 1px solid var(--border); display: flex; flex-direction: column; }
        .stat-label { font-size: 0.875rem; color: var(--text-unded); font-weight: 500; text-transform: uppercase; letter-spacing: 0.025em; }
        .stat-value { font-size: 1.875rem; font-weight: 700; margin-top: 0.5rem; color: var(--text-main); }

        /* --- COMPONENTS: TABLES & LISTS --- */
        .data-table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.875rem; }
        th { background: #f8fafc; padding: 1rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); color: var(--text-main); }
        tr:hover { background: #f1f5f9; }

        /* --- COMPONENTS: MODAL & OVERLAY --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
        .modal-content { background: white; border-radius: 16px; width: 100%; max-width: 500px; overflow: hidden; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); text-align: right; display: flex; justify-content: flex-end; gap: 10px; }

        /* --- COMPONENTS: QR SCANNER SIMULATION --- */
        #qr-scanner-view { text-align: center; padding: 3rem; }
        .scanner-box { width: 280px; height: 280px; border: 4px solid var(--primary); margin: 0 auto 2rem; border-radius: 24px; position: relative; overflow: hidden; background: #000; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: var(--primary); top: 0; animation: scanLine 2s infinite ease-in-out; box-shadow: 0 0 15px var(--primary); }
        @keyframes scanLine { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* --- COMPONENTS: KANBAN / TASK CARDS --- */
        .task-card { border-left: 4px solid var(--primary); padding: 1rem; margin-bottom: 1rem; background: #f8fafc; border-radius: 0 8px 8px 0; }
        .priority-high { border-left-color: var(--danger); }
        .priority-medium { border-left-color: var(--warning); }
        .priority-low { border-left-color: var(--success); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            #sidebar { width: 0; position: absolute; height: 100%; left: -260px; z-index: 50; }
            #sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>OpsCore Pro</h1>
            <p>Sign in to your workspace</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-user" class="form-control" placeholder="e.g., admin" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div style="margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                Demo Access: admin/admin123, manager/manager123, staff/staff123
            </div>
        </div>
    </div>

    <!-- MAIN APPLICATION SHELL -->
    <div id="app-shell" class="hidden">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-logo">
                <span>🚀</span> OpsCore
            </div>
            <nav class="sidebar-nav" id="main-nav">
                <!-- Navigation items injected by JS based on role -->
            </nav>
            <div style="padding: 1.5rem;">
                <button onclick="app.logout()" class="nav-item" style="width: 100%; color: var(--danger);">
                    <span>🚪</span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <header>
                <div class="flex items-center" style="gap: 15px;">
                    <button id="menu-toggle" style="background: none; font-size: 1.2rem; display: none;">☰</button>
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="user-profile" onclick="app.showProfile()">
                    <div class="text-center" style="line-height: 1;">
                        <div id="header-username" style="font-weight: 600; font-container: 0.8rem;">Admin</div>
                        <div id="header-role" style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Administrator</div>
                    </div>
                    <div class="avatar" id="user-avatar">A</div>
                </div>
            </header>

            <div id="view-port" class="view-container">
                <!-- Views injected here dynamically -->
            </div>
        </main>
    </div>

    <!-- MODAL TEMPLATE -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button onclick="app.closeModal()" style="background: none; font-size: 1.5rem;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form or content injected here -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Buttons injected here -->
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        /**
         * CORE APPLICATION ENGINE
         */
        const app = {
            user: null,
            currentView: 'dashboard',
            
            // Mock Data Store (In real app, this would be an API)
            state: {
                employees: [
                    { id: 1, name: "Alice Johnson", role: "Manager", team: "Operations", score: 98 },
                    { id:					2, name: "Bob Smith", role: "Employee", team: "Field", score: 85 },
                    { id: 3, name: "Charlie Davis", role: "Employee", team: "Logistics", score: 72 }
                ],
                attendance: [
                    { date: '2023-10-26', name: 'Alice Johnson', status: 'Present', time: '08:55 AM' },
                    { date: '2023-10-26', name: 'Bob Smith', status: 'Late', time: '09:15 AM' }
                ],
                tasks: [
                    { id: 101, title: "Daily Inventory Check", assignee: "Bob Smith", priority: "high", status: "In Progress" },
                    { id: 102, title: "Submit Weekly Report", assignee: "Charlie Davis", priority: "medium", status: "Pending" }
                ],
                dataEntries: [
                    { id: 1, field: "Site Temperature", value: "22°C", timestamp: "10:00 AM", operator: "Bob Smith" },
                    { id: 2, field: "Stock Level", value: "450 units", timestamp: "11:30 AM", operator: "Alice Johnson" }
                ]
            },

            init() {
                this.attachListeners();
                // Check if user was already logged in (localstorage)
                const savedUser = localStorage.getItem('ops_user');
                if (savedUser) {
                    this.user = JSON.parse(savedUser);
                    this.showApp();
                }
                console.log("OpsCore Engine Initialized");
            },

            attachListeners() {
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });
                document.getElementById('menu-toggle').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                });
            },

            login() {
                const u = document.getElementById('login-user').value;
                const p = document.getElementById('login-pass').value;

                // Simple Auth Logic
                let role = '';
                if (u === 'admin' && p === 'admin123') role = 'Admin';
                else if (u === 'manager' && p === 'manager123') role = 'Manager';
                else if (u === 'staff' && p === 'staff123') role = 'Employee';

                if (role) {
                    this.user = { name: u, role: role, avatar: u[0].toUpperCase() };
                    localStorage.setItem('ops_user', JSON.stringify(this.user));
                    this.showApp();
                } else {
                    alert("Invalid Credentials");
                }
            },

            logout() {
                localStorage.removeItem('ops_user');
                location.reload();
            },

            showApp() {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                document.getElementById('header-username').innerText = this.user.name;
                document.getElementById('header-role').innerText = this.user.role;
                document.getElementById('user-avatar').innerText = this.user.avatar;
                this.renderSidebar();
                this.navigateTo('dashboard');
            },

            renderSidebar() {
                const nav = document.getElementById('main-nav');
                let links = [
                    { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                    { id: 'attendance', label: 'Attendance', icon: '📅' },
                    { id: 'qr-scan', label: 'QR Scanner', icon: '📷' },
                    { id: 'tasks', label: 'Tasks', icon: '✅' },
                    { id: 'data-entry', label: 'Data Entry', icon: '📝' }
                ];

                // Role Based Access Control (RBAC)
                if (this.user.role === 'Employee') {
                    links = links.filter(l => ['dashboard', 'attendance', 'qr-scan', 'tasks'].includes(l.id));
                } else if (this.user.role === 'Manager') {
                    // Managers can see everything except Admin Settings
                } else {
                    links.push({ id: 'employees', label: 'Employees', icon: '👥' });
                    links.push({ id: 'reports', label: 'Reports', icon: '📈' });
                    links.push({ id: 'settings', label: 'Settings', icon: '⚙️' });
                }

                nav.innerHTML = links.map(link => `
                    <a href="#" class="nav-item ${this.currentView === link.id ? 'active' : ''}" 
                       onclick="app.navigateTo('${link.id}')">
                        <span>${link.icon}</span> ${link.label}
                    </a>
                `).join('');
            },

            navigateTo(viewId) {
                this.currentView = viewId;
                document.getElementById('view-title').innerText = this.getLabelById(viewId);
                this.renderSidebar();
                this.renderView(viewId);
                
                // Close sidebar on mobile after click
                if (windowleSize() < 768) document.getElementById('sidebar').classList.remove('open');
            },

            getLabelById(id) {
                const labels = { dashboard: 'Dashboard', attendance: 'Attendance Management', 'qr-scan': 'QR Check-In', tasks: 'Task Delegation', 'data-entry': 'Data Entry Logs', employees: 'Staff Directory', reports: 'Analytics Reports', settings: 'System Settings' };
                return labels[id] || 'View';
            },

            renderView(viewId) {
                const port = document.getElementById('view-port');
                port.innerHTML = ''; // Clear

                switch(viewId) {
                    case 'dashboard': this.viewDashboard(port); break;
                    case 'attendance': this.viewAttendance(port); break;
                    case 'qr-scan': this.viewQRScanner(port); break;
                    case 'tasks': this.viewTasks(port); break;
                    case 'data-entry': this.viewDataEntry(port); break;
                    case 'employees': this.viewEmployees(port); break;
                    default: port.innerHTML = `<div class="card p-4">Coming soon...</div>`;
                }
            },

            // --- VIEW: DASHBOARD ---
            viewDashboard(container) {
                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">Total Staff</span>
                            <span class="stat-value">${this.state.employees.length}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Active Tasks</span>
                            <span class="stat-value" style="color: var(--warning)">${this.state.tasks.filter(t=>t.status !== 'Completed').length}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Today's Attendance</span>
                            <span class="stat-value" style="color: var(--success)">94%</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Pending Entries</span>
                            <span class="stat-value">${this.state.dataEntries.length}</span>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                        <div class="card">
                            <div class="p-4" style="font-weight:600; border-bottom: 1px solid var(--border);">Recent Activity</div>
                            <div class="data-table-container">
                                <table>
                                    <thead><tr><th>User</th><th>Action</th><th>Time</th></tr></thead>
                                    <tbody>
                                        ${this.state.attendance.map(a => `<tr><td>${a.name}</td><td><span class="badge badge-success">${a.status}</span></td><td>${a.time}</td></tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card">
                            <div class="p-4" style="font-weight:600; border-bottom: 1px solid var(--border);">Top Performers</div>
                            <div class="p-4">
                                ${this.state.employees.sort((a,b) => b.score - a.score).slice(0,3).map(e => `
                                    <div class="flex items-center justify-between mb-4">
                                        <span>${e.name}</span>
                                        <span class="badge badge-success">${e.score}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            // --- VIEW: ATTENDANCE ---
            viewAttendance(container) {
                container.innerHTML = `
                    <div class="card">
                        <div class="p-4 flex justify-between items-center">
                            <h3 style="font-size:1.1rem;">Attendance Logs</h3>
                            <button onclick="app.openManualAttendance()" class="btn-primary" style="width:auto; padding: 0.5rem 1rem;">+ Manual Entry</button>
                        </div>
                        <div class="data-table-container">
                            <table>
                                <thead><tr><th>Date</th><th>Employee</th><th>Status</th><th>Time</th></tr></thead>
                                <tbody>
                                    ${this.state.attendance.map(a => `
                                        <tr>
                                            <td>${a.date}</td>
                                            <td>${a.name}</td>
                                            <td><span class="badge ${a.status === 'Present' ? 'badge-success' : 'badge-warning'}">${a.status}</span></td>
                                            <td>${a.time}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            // --- VIEW: QR SCANNER SIMULATION ---
            viewQRScanner(container) {
                container.innerHTML = `
                    <div class="card" id="qr-scanner-view">
                        <h3>Scan Attendance QR</h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">Position the company QR code within the frame</p>
                        <div class="scanner-box">
                            <div class="scanner-line"></div>
                            <div style="height:100%; display:flex; align-items:center; justify-content:center; color:white; font-size: 0.8rem;">[ CAMERA FEED ACTIVE ]</div>
                        </div>
                        <div class="form-group" style="max-width: 300px; margin: 0 auto;">
                            <input type="text" id="qr-input-sim" class="form-control" placeholder="Simulate Scan (Type 'SCAN123')">
                            <button onclick="app.simulateScan()" class="btn-primary mt-4">Simulate Trigger</button>
                        </div>
                    </div>
                `;
            },

            // --- VIEW: TASKS ---
            viewTasks(container) {
                container.innerHTML = `
                    <div class="flex" style="gap: 2rem;">
                        <div style="flex: 1;">
                            <div class="flex justify-between items-center mb-4">
                                <h3 style="font-size: 1.25rem;">Active Tasks</h3>
                                <button onclick="app.openTaskModal()" class="btn-primary" style="width:auto; padding: 0.5rem 1rem;">+ Assign Task</button>
                            </div>
                            <div id="task-list">
                                ${this.state.tasks.map(t => `
                                    <div class="task-card priority-${t.priority}">
                                        <div class="flex justify-between items-center">
                                            <span style="font-weight:600;">${t.title}</span>
                                            <span class="badge badge-info">${t.status}</span>
                                        </div>
                                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">
                                            Assigned to: ${t.assignee}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            // --- VIEW: DATA ENTRY ---
            viewDataEntry(container) {
                container.innerHTML = `
                    <div class="card">
                        <div class="p-4" style="font-weight:600; border-bottom: 1px solid var(--border);">Recent Operational Data Entries</div>
                        <div class="data-table-container">
                            <table>
                                <thead><tr><th>Field</th><th>Value</th><th>Operator</th><th>Timestamp</th></tr></thead>
                                <tbody>
                                    ${this.state.dataEntries.map(d => `
                                        <tr>
                                            <td><strong>${d.field}</strong></td>
                                            <td>${d.value}</td>
                                            <td>${d.operator}</td>
                                            <td style="color: var(--text-muted)">${d.timestamp}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            // --- VIEW: EMPLOYEES ---
            viewEmployees(container) {
                container.innerHTML = `
                    <div class="card">
                         <div class="p-4" style="font-weight:600; border-bottom: 1px solid var(--border);">Staff Directory</div>
                         <div class="data-table-container">
                            <table>
                                <thead><tr><th>Name</th><th>Role</th><th>Team</th><th>Score</th></tr></thead>
                                <tbody>
                                    ${this.state.employees.map(e => `
                                        <tr>
                                            <td><strong>${e.name}</strong></td>
                                            <td>${e.role}</td>
                                            <td>${e.team}</td>
                                            <td><span class="badge badge-success">${e.score}%</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                         </div>
                    </div>
                `;
            },

            // --- BUSINESS LOGIC METHODS ---

            simulateScan() {
                const val = document.getElementById('qr-input-sim').value;
                if (val === 'SCAN123') {
                    alert("✅ QR Scan Successful! Check-in recorded for: " + this.user.name);
                    const newEntry = {
                        date: new Date().toLocaleDateString(),
                        name: this.user.name,
                        status: 'Present',
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    };
                    this.state.attendance.unshift(newEntry);
                    this.navigateTo('attendance');
                } else {
                    alert("❌ Invalid QR Code");
                }
            },

            openManualAttendance() {
                this.showModal('Manual Attendance Entry', `
                    <div class="form-group">
                        <label>Select Employee</label>
                        <select id="modal-emp-select" class="form-control">
                            ${this.state.employees.map(e => `<option value="${e.name}">${e.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="modal-att-status" class="form-control">
                            <option>Present</option>
                            <option>Late</option>
                            <option>Absent</option>
                        </select>
                    </div>
                `, `
                    <button onclick="app.saveManualAttendance()" class="btn-primary">Save Record</button>
                `);
            },

            saveManualAttendance() {
                const name = document.getElementById('modal-emp-select').value;
                const status = document.getElementById('modal-att-status').value;
                this.state.attendance.unshift({
                    date: new Date().toLocaleDateString(),
                    name: name,
                    status: status,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                this.closeModal();
                this.navigateTo('attendance');
            },

            openTaskModal() {
                this.showModal('Assign New Task', `
                    <div class="form-group">
                        <label>Task Title</label>
                        <input type="text" id="task-title-in" class="form-control" placeholder="e.g. Site Inspection">
                    </div>
                    <div class="form-group">
                        <label>Assign To</label>
                        <select id="task-assignee-in" class="form-control">
                            ${this.state.employees.map(e => `<option value="${e.name}">${e.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="task-priority-in" class="form-control">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                `, `
                    <button onclick="app.saveTask()" class="btn-primary">Create Task</button>
                `);
            },

            saveTask() {
                const title = document.getElementById('task-title-in').value;
                const assignee = document.getElementById('task-assignee-in').value;
                const priority = document.getElementById('task-priority-in').value;
                if(!title) return alert("Title required");

                this.state.tasks.push({
                    id: Date.now(),
                    title, assignee, priority, status: 'Pending'
                });
                this.closeModal();
                this.navigateTo('tasks');
            },

            // --- MODAL ENGINE ---
            showModal(title, bodyHtml, footerHtml) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerHTML = bodyHtml;
                document.getElementById('modal-footer').innerHTML = footerHTML || ''; 
                // Note: In the real implementation logic above I used a variable, let's fix the call pattern
                document.getElementById('modal-footer').innerHTML = footerHtml;
                document.getElementById('modal-container').classList.remove('hidden');
            },

            closeModal() {
                document.getElementById('modal-container').classList.add('hidden');
            },

            showProfile() {
                alert(`User Profile:\nName: ${this.user.name}\nRole: ${this.user.role}\nSystem Status: Online`);
            }
        };

        // Helper to detect screen size
        function windowleSize() { return window.innerWidth; }

        // Boot the app
        window.onload = () => app.init();

    </script>
</body>
</html>
